server:
  port: 8081

spring:
  application:
    name: user-service
  config:
    import:
      - "optional:configserver:"
      - "optional:file:.env[.properties]"
  cloud:
    config:
      enabled: ${SPRING_CLOUD_CONFIG_ENABLED:false}
      discovery:
        enabled: true
        service-id: config-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sparta_logistics?currentSchema=user_db}
    username: ${DB_USERNAME:sparta}
    password: ${DB_PASSWORD:sparta1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: user_db
    show-sql: false
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:sparta-logistics}
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/sparta-logistics}
  admin:
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:user-service-admin}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:user-service-admin-secret}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:local}
  traces-sample-rate: 1.0
  send-default-pii: false

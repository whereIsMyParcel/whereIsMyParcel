spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

---
spring:
  config:
    activate:
      on-profile: local
    import: "configserver:http://localhost:8888"
  cloud:
    config:
      discovery:
        enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/sparta-logistics

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

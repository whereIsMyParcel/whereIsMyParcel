server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/whereIsMyParcel/config-hub.git
          default-label: main
          clone-on-start: true

        health:
          repositories:
            user-service:
              name: user-service
              profiles: dev
              label: main
            api-gateway:
              name: api-gateway
              profiles: dev
              label: main

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health
server:
  port: 8086

spring:
  application:
    name: ai-slack-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: ${SPRING_CLOUD_CONFIG_ENABLED:false}
      discovery:
        enabled: true
        service-id: config-server
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/sparta_logistics?currentSchema=notification_db}
    username: ${DB_USERNAME:sparta}
    password: ${DB_PASSWORD:sparta1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: notification_db
    show-sql: false
    open-in-view: false
  ai:
    google:
      genai:
        api.key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.0-flash

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

slack:
  bot:
    token: ${SLACK_BOT_TOKEN}

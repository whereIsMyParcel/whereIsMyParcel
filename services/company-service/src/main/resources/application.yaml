server:
  port: 8083

spring:
  application:
    name: company-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: ${SPRING_CLOUD_CONFIG_ENABLED:false}
      discovery:
        enabled: true
        service-id: config-server
  datasource:
    url: ${COMPANY_DB_URL:jdbc:postgresql://localhost:5432/sparta_logistics?currentSchema=company_db}
    username: ${DB_USERNAME:sparta}
    password: ${DB_PASSWORD:sparta1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: company_db
    show-sql: false
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
